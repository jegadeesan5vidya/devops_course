#This is the workflow name/label which will be shown in the github action cy
name: build-and-lint

#Define below triggers when this workflow should run
#Trigger the workflow whenever there is a change to the main and dev branches
# Trigger the workflow whenever there is a pull request for the main and dev branches 
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
# Define jobs here (can define multiple jobs)
jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Lint backend
        working-directory: server
        run: npm run lint -- --max-warnings=0

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Lint frontend
        working-directory: client
        run: npm run lint -- --max-warnings=0

      - name: Build backend image
        working-directory: server
        run: |
          docker network create mern-net || true
          docker build -t mern-backend .

      - name: Build frontend image
        working-directory: client
        run: |
          docker build -t mern-frontend --build-arg VITE_API_URL=http://localhost:5000/api .
  deploy:
    needs: build-and-lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps: 
      - name: checkout (optional)
        uses: actions/checkout@v4
      
      - name: Add EC2 host to known hosts
        run: | 
          mkdir -p ~/.ssh
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
        env: 
          EC2_HOST: ${{ screts.EC2_HOST }}

      - name: Write SSH Key
        run: |
          echo "${EC2_KEY}" > ec2_key.pem
          chmod 600 ec2_key.pem
        env:
          EC2_KEY: ${{ screts.EC2_KEY }}

      - name: Deploy on EC2 (git pull + docker compose up -d --build)
        env: 
          EC2_HOST: ${{ screts.EC2_HOST }}
          EC2_USER: ${{ screts.EC2_USER }}
          EC2_APP_DIR: ${{ screts.EC2_APP_DIR }}
        run: |
          ssh -i ec2_key.pem ${EC2_USER}@${EC2_HOST} << EOF
            set -e
            cd "${EC2_APP_DIR}"

            git fetch --all
            git reset --hard origin/main

            docker compose up -d --build
            docker image prune -f
            docker compose ps
          EOF

