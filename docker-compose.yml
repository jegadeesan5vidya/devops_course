services:
  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: unless-stopped
    volumes: 
      - demo-vol:/data/db
    networks: 
      - app-net

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    depends_on: 
      - mongo
    networks: 
      - app-net

  frontend:
    build: 
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: frontend
    restart: unless-stopped
    depends_on: 
      - backend
    networks: 
      - app-net

  nginx: 
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    volumes: 
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports: 
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks: 
      - app-net

volumes: 
  demo-vol:
    external: true
  
networks: 
  app-net: 
    driver: bridge